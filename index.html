<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raunak</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <div class="midbox">
            <div class="balance-box">
                <h2>Your Balance</h2>
                <h2 class="balance-amount rupee" id="Balance">&#8377 0.00</h2>
            </div>
            <div class="income box">
                <h2>Income</h2>
                <h2 class="rupee"  id="Income">&#8377 0.00</h2>
            </div>
            <div class="expense box">
                <h2>Expense</h2>
                <h2 id="Expense" class="rupee">&#8377 0.00</h2>
            </div>
        </div>
        <div class="bottombox">
            <div class=" left boxl" id="Transactions">
                <h2>Transactions</h2>
            </div>
            <div class="right boxl">
                <h2>Add Transaction</h2>
                <form>
                    <label for="type" id="entry">Entry Type: </label>
                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <br><br>
                    <label for="description">Description</label>
                    <input class="input" type="text" id="description" placeholder="Enter description" required>
                    <label for="amount">Amount</label>
                    <input class="input"  type="number" id="amount" placeholder="Enter amount" required>
                    <button type="submit" id="button">Add Transaction</button>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="./script.js"></script>
</html>
